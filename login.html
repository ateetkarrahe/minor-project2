<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Cafeteria | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9800, #ff5722);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .auth-container {
            background: #fff;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }
        .auth-container h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
            font-size: 28px;
        }
        .auth-container .subtitle {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }
        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }
        .tab.active {
            color: #ff5722;
            border-bottom-color: #ff5722;
        }
        .tab:hover {
            color: #ff5722;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ff5722;
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff5722, #ff9800);
            border: none;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 87, 34, 0.4);
        }
        .auth-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .message.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #ff5722;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>🍽️ CampusEats</h2>
    <p class="subtitle">Order food from your college cafeteria</p>

    <div class="tabs">
        <div class="tab active" onclick="showTab('login')">Login</div>
        <div class="tab" onclick="showTab('register')">Register</div>
    </div>

    <div id="message" class="message"></div>

    <!-- Login Form -->
    <div id="login-form" class="form-section active">
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="your.email@college.edu" required>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="auth-btn" id="login-btn">Login</button>
        </form>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="form-section">
        <form onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="reg-name">Full Name</label>
                <input type="text" id="reg-name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" placeholder="your.email@college.edu" required>
            </div>
            <div class="form-group">
                <label for="reg-studentid">Student ID</label>
                <input type="text" id="reg-studentid" placeholder="e.g., STU2025001" required>
            </div>
            <div class="form-group">
                <label for="reg-phone">Phone (Optional)</label>
                <input type="tel" id="reg-phone" placeholder="10-digit mobile number">
            </div>
            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" placeholder="Min 6 characters" minlength="6" required>
            </div>
            <button type="submit" class="auth-btn" id="register-btn">Create Account</button>
        </form>
    </div>

    <div class="back-link">
        <a href="index.html">← Back to Home</a>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    // Show tab
    function showTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
        
        document.querySelector(`.tab:${tab === 'login' ? 'first-child' : 'last-child'}`).classList.add('active');
        document.getElementById(`${tab}-form`).classList.add('active');
        
        hideMessage();
    }

    // Show message
    function showMessage(text, type) {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.className = `message ${type}`;
    }

    function hideMessage() {
        document.getElementById('message').className = 'message';
    }

    // Set loading state
    function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        if (loading) {
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Please wait...';
        } else {
            btn.disabled = false;
            btn.textContent = btnId === 'login-btn' ? 'Login' : 'Create Account';
        }
    }

    // Handle Login
    async function handleLogin(e) {
        e.preventDefault();
        hideMessage();
        setLoading('login-btn', true);

        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        try {
            await window.API.auth.login(email, password);
            showMessage('Login successful! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        } catch (error) {
            showMessage(error.message || 'Invalid email or password', 'error');
            setLoading('login-btn', false);
        }
    }

    // Handle Register
    async function handleRegister(e) {
        e.preventDefault();
        hideMessage();
        setLoading('register-btn', true);

        const userData = {
            name: document.getElementById('reg-name').value,
            email: document.getElementById('reg-email').value,
            studentId: document.getElementById('reg-studentid').value,
            phone: document.getElementById('reg-phone').value,
            password: document.getElementById('reg-password').value
        };

        try {
            await window.API.auth.register(userData);
            showMessage('Account created successfully! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        } catch (error) {
            showMessage(error.message || 'Registration failed', 'error');
            setLoading('register-btn', false);
        }
    }

    // Check if already logged in
    if (window.API && window.API.isLoggedIn()) {
        window.location.href = 'index.html';
    }
</script>

</body>
</html>
