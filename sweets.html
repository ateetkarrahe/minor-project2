<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Menu | CampusEats</title>

    <style>
        /* -------- GLOBAL -------- */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        /* -------- HEADER -------- */
        header {
            background-color: #ff6f00;
            color: white;
            text-align: center;
            padding: 30px;
        }

        /* -------- SECTION -------- */
        .menu-section {
            padding: 30px;
        }

        .category-title {
            color: #ff6f00;
            margin-bottom: 15px;
            border-bottom: 2px solid #ff6f00;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* -------- GRID -------- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        /* -------- CARD -------- */
        .menu-card {
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .menu-card:hover {
            transform: scale(1.03);
        }

        .menu-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .menu-info {
            padding: 15px;
        }

        .menu-info h3 {
            margin: 0;
            color: #333;
        }

        .menu-info p {
            font-size: 14px;
            color: #555;
            margin: 8px 0;
        }

        .price {
            font-weight: bold;
            color: #ff6f00;
        }

        /* -------- BUTTON -------- */
        .add-btn {
            width: 100%;
            padding: 10px;
            background-color: #ff6f00;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        /* -------- FOOTER -------- */
        footer {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <header>
        <h1>🍽️ Sweets </h1>
        <p>Fresh food from your campus canteen</p>
    </header>

    <!-- SNACKS -->
    <section class="menu-section">
        <h2 class="category-title">Sweets</h2>

        <div class="menu-grid">

            <div class="menu-card">
                <img src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto,w_208,h_208,c_fit/FOOD_CATALOG/IMAGES/CMS/2024/3/9/0459a2ae-f2b8-430e-99e1-527a850bfe96_1e16abd0-e52e-4cdd-8976-25f52ea7973d
" alt="rasmalai">
                <div class="menu-info">
                    <h3>Rasmalai</h3>
                    <p class="price">₹60</p>
                    <button class="add-btn">Add to Cart</button>
                </div>
            </div>

            <div class="menu-card">
                <img src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto,w_208,h_208,c_fit/FOOD_CATALOG/IMAGES/CMS/2025/7/22/13c98eb3-71a8-44ae-b596-ed8b3b25889d_0e91820f-b8ae-4a8f-a38a-e73de7d415c6.jpeg
" alt="gulab jamun">
                <div class="menu-info">
                    <h3>Gulabjamun</h3>

                    <p class="price">₹40</p>
                    <button class="add-btn">Add to Cart</button>
                </div>
            </div>

            <div class="menu-card">
                <img src="
https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto,w_208,h_208,c_fit/FOOD_CATALOG/IMAGES/CMS/2025/8/22/46a3b602-2b56-4a3d-a06b-b21bfb379105_a97f1335-6130-444f-a54c-10bd03308fc7.jpeg"
                    alt="jalebi">
                <div class="menu-info">
                    <h3>Jalebi</h3>

                    <p class="price">₹20</p>
                    <button class="add-btn">Add to Cart</button>
                </div>
            </div>

        </div>
    </section>




    <footer>
        © 2025 CampusEats | College Project
    </footer>

    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>

</body>

</html>
