<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Offers | CampusEats</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
    }

    header {
      background: #ff6f00;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .offers {
      padding: 20px;
    }

    .offer-card {
      background: white;
      margin: 15px 0;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
    }

    footer {
      text-align: center;
      background: #222;
      color: white;
      padding: 10px;
    }
  </style>

</head>
<body>

<header>
  <h1>Special Offers</h1>
</header>

<section class="offers">
  <div class="offer-card">
    <h2>🍔 Student Combo</h2>
    <p>Burger + Fries + Cold Drink</p>
    <strong>₹99 Only</strong>
  </div>

  <div class="offer-card">
    <h2>🍕 Friday Pizza Offer</h2>
    <p>Buy 1 Get 1 Free</p>
    <strong>Every Friday</strong>
  </div>

  <div class="offer-card">
    <h2>☕ Morning Tea Offer</h2>
    <p>50% Off on Tea & Coffee</p>
    <strong>8 AM – 10 AM</strong>
  </div>
</section>

<footer>
  Offers valid for college students only
</footer>

</body>
</html>
