<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management | Lunchtime Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .nav-link.active {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: #fff;
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.3);
        }

        .nav-link i {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 30px;
            min-height: 100vh;
        }

        /* Page Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
        }

        .page-title span {
            color: #f7931e;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-box input {
            background: transparent;
            border: none;
            padding: 12px;
            color: #fff;
            width: 250px;
            font-size: 14px;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-box input:focus {
            outline: none;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(247, 147, 30, 0.3);
        }

        .stat-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
        }

        .stat-card.pending .stat-value {
            color: #ffd93d;
        }

        .stat-card.confirmed .stat-value {
            color: #6bcb77;
        }

        .stat-card.preparing .stat-value {
            color: #4d96ff;
        }

        .stat-card.ready .stat-value {
            color: #a855f7;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 10px 20px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 14px;
        }

        .filter-tab:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .filter-tab.active {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            border-color: transparent;
            color: #fff;
        }

        /* Orders Container */
        .orders-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        /* Orders Table */
        .orders-table {
            width: 100%;
            border-collapse: collapse;
        }

        .orders-table th {
            background: rgba(255, 255, 255, 0.05);
            padding: 18px 20px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .orders-table td {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            vertical-align: middle;
        }

        .orders-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .order-id {
            font-weight: 700;
            color: #f7931e;
            font-size: 14px;
        }

        .customer-cell {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .customer-name {
            font-weight: 600;
            color: #fff;
        }

        .customer-email {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .customer-id {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 4px;
        }

        .items-cell {
            max-width: 250px;
        }

        .item-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            margin: 2px;
            color: rgba(255, 255, 255, 0.9);
        }

        .amount-cell {
            font-weight: 700;
            font-size: 16px;
            color: #6bcb77;
        }

        .location-cell {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            max-width: 150px;
        }

        /* Status Badge */
        .status-badge {
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-pending {
            background: rgba(255, 217, 61, 0.15);
            color: #ffd93d;
            border: 1px solid rgba(255, 217, 61, 0.3);
        }

        .status-confirmed {
            background: rgba(107, 203, 119, 0.15);
            color: #6bcb77;
            border: 1px solid rgba(107, 203, 119, 0.3);
        }

        .status-preparing {
            background: rgba(77, 150, 255, 0.15);
            color: #4d96ff;
            border: 1px solid rgba(77, 150, 255, 0.3);
        }

        .status-ready {
            background: rgba(168, 85, 247, 0.15);
            color: #a855f7;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .status-delivered {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-cancelled {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Status Dropdown */
        .status-select {
            padding: 10px 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .status-select:focus {
            outline: none;
            border-color: #f7931e;
        }

        .status-select option {
            background: #1a1a2e;
            color: #fff;
        }

        /* Date Cell */
        .date-cell {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .date-time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 3px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state .icon {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #f7931e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Notification */
        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 12px;
            color: #fff;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideInUp 0.3s ease;
            z-index: 1000;
        }

        .notification.success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .notification.error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        @keyframes slideInUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Order Details Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.9);
            transition: all 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            padding: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 20px;
            color: #fff;
        }

        .modal-close {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .modal-body {
            padding: 25px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .detail-value {
            color: #fff;
            font-weight: 500;
        }

        .order-items-list {
            margin-top: 20px;
        }

        .order-items-list h4 {
            margin-bottom: 15px;
            color: #f7931e;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .item-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .item-qty {
            background: #f7931e;
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
        }

        .item-price {
            font-weight: 600;
            color: #6bcb77;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                width: 80px;
                padding: 15px;
            }

            .logo-text,
            .nav-link span {
                display: none;
            }

            .logo {
                justify-content: center;
            }

            .nav-link {
                justify-content: center;
                padding: 14px;
            }

            .main-content {
                margin-left: 80px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .search-box input {
                width: 100%;
            }

            .orders-table {
                display: block;
                overflow-x: auto;
            }

            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">🍽️</div>
            <span class="logo-text">Lunchtime</span>
        </div>
        <nav>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="admin-dashboard.html" class="nav-link">
                        <span>📊</span>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="admin-orders.html" class="nav-link active">
                        <span>📦</span>
                        <span>Orders</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="index.html" class="nav-link">
                        <span>🏠</span>
                        <span>View Site</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" onclick="logout()">
                        <span>🚪</span>
                        <span>Logout</span>
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Page Header -->
        <header class="page-header">
            <h1 class="page-title">Order <span>Management</span></h1>
            <div class="header-actions">
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" id="searchInput" placeholder="Search orders..." oninput="searchOrders()">
                </div>
                <button class="btn btn-primary" onclick="loadOrders()">
                    <span>🔄</span> Refresh
                </button>
            </div>
        </header>

        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat-card pending">
                <div class="stat-label">Pending</div>
                <div class="stat-value" id="pendingCount">0</div>
            </div>
            <div class="stat-card confirmed">
                <div class="stat-label">Confirmed</div>
                <div class="stat-value" id="confirmedCount">0</div>
            </div>
            <div class="stat-card preparing">
                <div class="stat-label">Preparing</div>
                <div class="stat-value" id="preparingCount">0</div>
            </div>
            <div class="stat-card ready">
                <div class="stat-label">Ready</div>
                <div class="stat-value" id="readyCount">0</div>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-status="all" onclick="filterByStatus('all', this)">All
                Orders</button>
            <button class="filter-tab" data-status="pending" onclick="filterByStatus('pending', this)">Pending</button>
            <button class="filter-tab" data-status="confirmed"
                onclick="filterByStatus('confirmed', this)">Confirmed</button>
            <button class="filter-tab" data-status="preparing"
                onclick="filterByStatus('preparing', this)">Preparing</button>
            <button class="filter-tab" data-status="ready" onclick="filterByStatus('ready', this)">Ready</button>
            <button class="filter-tab" data-status="delivered"
                onclick="filterByStatus('delivered', this)">Delivered</button>
            <button class="filter-tab" data-status="cancelled"
                onclick="filterByStatus('cancelled', this)">Cancelled</button>
        </div>

        <!-- Orders Container -->
        <div class="orders-container" id="ordersContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading orders...</p>
            </div>
        </div>
    </main>

    <!-- Order Details Modal -->
    <div class="modal-overlay" id="orderModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Order Details</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Order details will be inserted here -->
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Store all orders
        let allOrders = [];
        let currentFilter = 'all';

        // Check admin authentication
        document.addEventListener('DOMContentLoaded', () => {
            checkAdminAuth();
            loadOrders();
        });

        function checkAdminAuth() {
            const user = window.API?.getUser();
            const token = window.API?.getToken();

            if (!token || !user) {
                window.location.href = 'admin.html';
                return;
            }

            if (user.role !== 'admin') {
                // Silently redirect non-admin users to login page
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'admin.html?error=access_denied';
                return;
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'admin.html';
        }

        // Load orders from API
        async function loadOrders() {
            const container = document.getElementById('ordersContainer');
            container.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Loading orders...</p>
                </div>
            `;

            try {
                const response = await fetch('http://localhost:5010/api/orders/admin/all', {
                    headers: {
                        'Authorization': `Bearer ${window.API.getToken()}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.success) {
                    allOrders = data.data;
                    updateStats(allOrders);
                    renderOrders(filterOrdersByStatus(allOrders, currentFilter));
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">❌</div>
                            <h3>Failed to load orders</h3>
                            <p>${data.message || 'Please try again later'}</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading orders:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <h3>Connection Error</h3>
                        <p>Unable to connect to server. Please check your connection.</p>
                    </div>
                `;
            }
        }

        // Filter orders by status
        function filterOrdersByStatus(orders, status) {
            if (status === 'all') return orders;
            return orders.filter(order => order.status === status);
        }

        // Filter button click handler
        function filterByStatus(status, button) {
            currentFilter = status;

            // Update active tab
            document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
            button.classList.add('active');

            // Re-render orders
            renderOrders(filterOrdersByStatus(allOrders, status));
        }

        // Search orders
        function searchOrders() {
            const query = document.getElementById('searchInput').value.toLowerCase();

            let filtered = filterOrdersByStatus(allOrders, currentFilter);

            if (query) {
                filtered = filtered.filter(order => {
                    const orderId = order._id.toLowerCase();
                    const customerName = (order.user?.name || '').toLowerCase();
                    const customerEmail = (order.user?.email || '').toLowerCase();
                    const items = order.items.map(i => i.name.toLowerCase()).join(' ');

                    return orderId.includes(query) ||
                        customerName.includes(query) ||
                        customerEmail.includes(query) ||
                        items.includes(query);
                });
            }

            renderOrders(filtered);
        }

        // Update stats
        function updateStats(orders) {
            const counts = {
                pending: 0,
                confirmed: 0,
                preparing: 0,
                ready: 0
            };

            orders.forEach(order => {
                if (counts.hasOwnProperty(order.status)) {
                    counts[order.status]++;
                }
            });

            document.getElementById('pendingCount').textContent = counts.pending;
            document.getElementById('confirmedCount').textContent = counts.confirmed;
            document.getElementById('preparingCount').textContent = counts.preparing;
            document.getElementById('readyCount').textContent = counts.ready;
        }

        // Render orders table
        function renderOrders(orders) {
            const container = document.getElementById('ordersContainer');

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <h3>No Orders Found</h3>
                        <p>There are no orders matching your criteria.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Items</th>
                            <th>Amount</th>
                            <th>Location</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${orders.map(order => `
                            <tr onclick="showOrderDetails('${order._id}')" style="cursor: pointer;">
                                <td class="order-id">#${order._id.slice(-8).toUpperCase()}</td>
                                <td>
                                    <div class="customer-cell">
                                        <span class="customer-name">${order.user?.name || 'N/A'}</span>
                                        <span class="customer-email">${order.user?.email || ''}</span>
                                        ${order.user?.studentId ? `<span class="customer-id">ID: ${order.user.studentId}</span>` : ''}
                                    </div>
                                </td>
                                <td class="items-cell">
                                    ${order.items.slice(0, 3).map(item => `<span class="item-tag">${item.name} ×${item.quantity}</span>`).join('')}
                                    ${order.items.length > 3 ? `<span class="item-tag">+${order.items.length - 3} more</span>` : ''}
                                </td>
                                <td class="amount-cell">₹${order.totalAmount}</td>
                                <td class="location-cell">${order.deliveryLocation || 'N/A'}</td>
                                <td>
                                    <span class="status-badge status-${order.status}">${order.status}</span>
                                </td>
                                <td class="date-cell">
                                    ${formatDate(order.createdAt)}
                                    <div class="date-time">${formatTime(order.createdAt)}</div>
                                </td>
                                <td onclick="event.stopPropagation()">
                                    <select class="status-select" onchange="updateOrderStatus('${order._id}', this.value)">
                                        <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Pending</option>
                                        <option value="confirmed" ${order.status === 'confirmed' ? 'selected' : ''}>Confirmed</option>
                                        <option value="preparing" ${order.status === 'preparing' ? 'selected' : ''}>Preparing</option>
                                        <option value="ready" ${order.status === 'ready' ? 'selected' : ''}>Ready</option>
                                        <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Delivered</option>
                                        <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                                    </select>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        // Update order status
        async function updateOrderStatus(orderId, newStatus) {
            try {
                const response = await fetch(`http://localhost:5010/api/orders/${orderId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${window.API.getToken()}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                const data = await response.json();

                if (data.success) {
                    // Update local data
                    const orderIndex = allOrders.findIndex(o => o._id === orderId);
                    if (orderIndex > -1) {
                        allOrders[orderIndex].status = newStatus;
                    }

                    // Re-render
                    updateStats(allOrders);
                    renderOrders(filterOrdersByStatus(allOrders, currentFilter));

                    showNotification('Order status updated successfully!', 'success');
                } else {
                    showNotification('Failed to update status', 'error');
                }
            } catch (error) {
                console.error('Error updating order:', error);
                showNotification('Error updating order', 'error');
            }
        }

        // Show order details modal
        function showOrderDetails(orderId) {
            const order = allOrders.find(o => o._id === orderId);
            if (!order) return;

            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">Order ID</span>
                    <span class="detail-value">#${order._id.slice(-8).toUpperCase()}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Customer</span>
                    <span class="detail-value">${order.user?.name || 'N/A'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Email</span>
                    <span class="detail-value">${order.user?.email || 'N/A'}</span>
                </div>
                ${order.user?.studentId ? `
                <div class="detail-row">
                    <span class="detail-label">Student ID</span>
                    <span class="detail-value">${order.user.studentId}</span>
                </div>
                ` : ''}
                <div class="detail-row">
                    <span class="detail-label">Delivery Location</span>
                    <span class="detail-value">${order.deliveryLocation || 'N/A'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Payment Method</span>
                    <span class="detail-value">${order.paymentMethod?.toUpperCase() || 'COD'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Status</span>
                    <span class="detail-value"><span class="status-badge status-${order.status}">${order.status}</span></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Order Date</span>
                    <span class="detail-value">${formatDate(order.createdAt)} at ${formatTime(order.createdAt)}</span>
                </div>
                ${order.specialInstructions ? `
                <div class="detail-row">
                    <span class="detail-label">Special Instructions</span>
                    <span class="detail-value">${order.specialInstructions}</span>
                </div>
                ` : ''}
                
                <div class="order-items-list">
                    <h4>Order Items</h4>
                    ${order.items.map(item => `
                        <div class="item-row">
                            <div class="item-info">
                                <span class="item-qty">${item.quantity}</span>
                                <span>${item.name}</span>
                            </div>
                            <span class="item-price">₹${item.price * item.quantity}</span>
                        </div>
                    `).join('')}
                </div>

                <div class="detail-row" style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                    <span class="detail-label">Subtotal</span>
                    <span class="detail-value">₹${order.subtotal}</span>
                </div>
                ${order.deliveryFee ? `
                <div class="detail-row">
                    <span class="detail-label">Delivery Fee</span>
                    <span class="detail-value">₹${order.deliveryFee}</span>
                </div>
                ` : ''}
                ${order.discount ? `
                <div class="detail-row">
                    <span class="detail-label">Discount</span>
                    <span class="detail-value" style="color: #6bcb77;">-₹${order.discount}</span>
                </div>
                ` : ''}
                <div class="detail-row">
                    <span class="detail-label" style="font-weight: 600;">Total</span>
                    <span class="detail-value" style="font-size: 20px; color: #f7931e;">₹${order.totalAmount}</span>
                </div>
            `;

            document.getElementById('orderModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.remove('active');
        }

        // Close modal on overlay click
        document.getElementById('orderModal').addEventListener('click', (e) => {
            if (e.target.id === 'orderModal') {
                closeModal();
            }
        });

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-IN', {
                day: '2-digit',
                month: 'short',
                year: 'numeric'
            });
        }

        // Format time
        function formatTime(dateString) {
            const date = new Date(dateString);
            return date.toLocaleTimeString('en-IN', {
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Show notification
        function showNotification(message, type = 'success') {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();

            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <span>${type === 'success' ? '✓' : '✕'}</span>
                <span>${message}</span>
            `;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Keyboard shortcut for closing modal
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>

</html>
